indexpage:
  title: Documentation ONTAP Select
  lead: NetApp ONTAP Select est une appliance de stockage définie par logiciel que
    vous pouvez déployer sur une variété de serveurs de matériel ordinaire exécutant
    l'hyperviseur VMware ESXi ou Kernel-based Virtual Machine (KVM). Elle offre l'agilité
    nécessaire pour construire une infrastructure cloud flexible et évolutive. Ce
    site contient la documentation pour ONTAP Select 9.18.1.
